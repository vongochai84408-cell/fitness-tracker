name: Fitness Tracker Auto Push

on:
  workflow_dispatch:
  schedule:
    - cron: '5 20 * * *'

jobs:
  push-records:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Add random example record if none (for demo)
        run: |
          python - <<'PY'
          import os, json
          from datetime import datetime
          os.makedirs('data', exist_ok=True)
          today = datetime.now().strftime('%Y-%m-%d')
          p = f'data/{today}.json'
          if not os.path.exists(p):
            with open(p, 'w', encoding='utf-8') as f:
              json.dump({'date': today, 'muscle_group': '', 'exercises': []}, f, ensure_ascii=False)
          PY
      - name: Commit and push changes
        run: |
          git config user.name "fitness-bot"
          git config user.email "fitness-bot@users.noreply.github.com"
          git add -A
          git commit -m "auto: update daily records" || echo "no changes"
          git push
